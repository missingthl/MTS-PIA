# ==============================================================================
# PIA Conda Environment Configuration
# ==============================================================================
# Usage:
#   conda env create -f environment.yml
#   conda activate pia
# ==============================================================================

name: pia

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch Ecosystem
  - pytorch>=2.5.0
  - torchvision>=0.20.0
  - torchaudio>=2.5.0
  - pytorch-cuda=12.1

  # Scientific Computing
  - numpy>=1.26.0,<2.0
  - scipy>=1.11.0,<1.15
  - scikit-learn>=1.3.0,<2.0
  - pandas>=2.1.0,<3.0

  # Visualization
  - matplotlib>=3.8.0

  # EEG Processing
  - mne>=1.6.0,<2.0

  # Riemannian Geometry
  - pyriemann>=0.6,<1.0

  # Utilities
  - tqdm>=4.60.0
  - joblib>=1.3.0
  - pyyaml>=6.0
  
  # Pip specific
  - pip
  - pip:
    - openpyxl>=3.0.0
